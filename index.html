<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal de Trading</title>
    <style>
        :root {
            --bg-color: #000000;
            --glass-bg: rgba(28, 28, 30, 0.45);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --text-subtle: #48484a;
            --apple-green: #32d74b;
            --apple-green-bg: rgba(50, 215, 75, 0.1);
            --apple-red: #ff453a;
            --apple-red-bg: rgba(255, 69, 58, 0.1);
            --apple-blue: #0a84ff;
            --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
        }

        /* Verrouillage strict de la page pour empêcher le scroll */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        body {
            background-image: 
                radial-gradient(circle at 10% 15%, rgba(10, 132, 255, 0.1), transparent 30%),
                radial-gradient(circle at 90% 45%, rgba(50, 215, 75, 0.06), transparent 30%);
            color: var(--text-main);
            font-family: var(--font);
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Conteneur calé au pixel près sur le viewport */
        .container {
            width: 100%;
            max-width: 440px; 
            height: 100dvh;
            box-sizing: border-box;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Aligne Header, Cards et Dock sans vide */
        }

        /* --- HEADER COMPACT --- */
        .header {
            text-align: center;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin: 0 0 4px 0;
            font-weight: 600;
        }

        .total-value-eur {
            font-size: 46px;
            font-weight: 700;
            letter-spacing: -1.5px;
            margin: 0;
            line-height: 1;
        }

        .total-value-usd {
            font-size: 17px;
            color: var(--text-muted);
            font-weight: 500;
            margin: 2px 0 10px 0;
        }

        .total-pl {
            display: inline-flex;
            padding: 6px 12px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255,255,255,0.02);
        }

        .up { color: var(--apple-green); }
        .down { color: var(--apple-red); }

        /* --- ZONE DES CARTES --- */
        .assets-list {
            display: flex;
            flex-direction: column;
            gap: 10px; /* Espace optimisé */
            flex-grow: 1;
            justify-content: center; /* Centre les cartes verticalement si l'écran est grand */
            margin: 10px 0;
        }

        /* --- CARTE ULTRA-COMPACTE (GLASSMORPHISM) --- */
        .asset-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 14px 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Ligne Principale (Ticker & Prix Totaux) */
        .row-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .ticker-info { display: flex; align-items: baseline; gap: 6px; }
        .asset-ticker { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
        .asset-shares { font-size: 12px; color: var(--text-muted); font-weight: 500; }

        .price-info { text-align: right; }
        .asset-total-eur { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
        .asset-total-usd { font-size: 12px; color: var(--text-muted); font-weight: 500; }

        /* Ligne Secondaire (PRU, Cours actuel & Gain/Perte) */
        .row-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .market-data { color: var(--text-muted); font-weight: 500; line-height: 1.4; }
        .market-data span { color: var(--text-main); font-weight: 600; }

        .pl-data { text-align: right; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .pl-usd { font-size: 11px; opacity: 0.7; font-weight: 500; }

        /* Badge pourcentages discrets */
        .trend-badge {
            padding: 2px 6px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
        }
        .trend-up { background: var(--apple-green-bg); color: var(--apple-green); }
        .trend-down { background: var(--apple-red-bg); color: var(--apple-red); }

        /* Ligne Stratégie intégrée au bas de la carte */
        .row-strategy {
            font-size: 11px;
            color: var(--text-muted);
            background: rgba(0,0,0,0.15);
            padding: 6px 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .strat-title { color: var(--apple-blue); font-weight: 600; margin-right: 4px; }
        
        /* Barre de progression miniature */
        .mini-progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.08);
            border-radius: 1.5px;
            margin-top: 4px;
            overflow: hidden;
        }
        .mini-progress-fill { height: 100%; background: var(--apple-blue); transition: width 0.5s; }

        /* --- LE DOCK IOS (TOUT EN UN BAS DE PAGE) --- */
        .bottom-dock {
            background: rgba(28, 28, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .dock-meta { font-size: 10px; color: var(--text-subtle); font-weight: 600; line-height: 1.3; text-transform: uppercase; }
        .dock-meta span { color: var(--text-muted); }

        .dock-input-group { display: flex; align-items: center; gap: 6px; }
        .dock-input-group label { font-size: 11px; font-weight: 700; color: var(--text-muted); }
        .dock-input-group input {
            background: rgba(0, 0, 0, 0.4);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 6px 8px;
            border-radius: 8px;
            width: 55px;
            font-size: 12px;
            font-weight: 600;
            outline: none;
            text-align: center;
        }
        .dock-input-group button {
            background: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 11px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Solde du Portefeuille</h1>
            <div id="total-value-eur" class="total-value-eur">--</div>
            <div id="total-value-usd" class="total-value-usd">--</div>
            <div id="total-pl" class="total-pl">--</div>
        </div>

        <div id="assets-container" class="assets-list">
            </div>

        <div class="bottom-dock">
            <div class="dock-meta">
                <div id="exchange-rate-display">EUR/USD : --</div>
                <div id="last-update">Sync : --</div>
            </div>
            <div class="dock-input-group">
                <label>SPCX $</label>
                <input type="number" id="spcx-manual-input" step="0.01" placeholder="166.84">
                <button onclick="applyManualSpcx()">OK</button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'd8nou8hr01qvvn99oe20d8nou8hr01qvvn99oe2g'; 

        const portfolio = [
            { ticker: 'TTWO', name: 'Take-Two', shares: 1.72064278, pru: 211.68 },
            { ticker: 'SPCX', name: 'SpaceX', shares: 1.00000000, pru: 135.00 },
            { ticker: 'NVDA', name: 'NVIDIA', shares: 0.34674018, pru: 210.04 }
        ];

        const strategies = {
            'TTWO': { title: '🎯 TARGET', desc: 'Ordre Limit de vente calé à 250 $.', targetPrice: 250 },
            'SPCX': { title: '💎 HOLD', desc: 'Fonds de tiroir. Objectif Jackpot.', targetPrice: null },
            'NVDA': { title: '⏳ HOLD', desc: 'En sommeil. Renfort prévu via cash TTWO.', targetPrice: null }
        };

        let manualSpcxPrice = null;

        function applyManualSpcx() {
            const inputVal = document.getElementById('spcx-manual-input').value;
            if (inputVal && !isNaN(inputVal)) {
                manualSpcxPrice = parseFloat(inputVal);
                updateDashboard(); 
            }
        }

        async function fetchExchangeRate() {
            try {
                const response = await fetch('https://api.coinbase.com/v2/exchange-rates?currency=USD');
                const data = await response.json();
                return parseFloat(data.data.rates.EUR);
            } catch (error) {
                console.error("Erreur change:", error);
                return 0.93; 
            }
        }

        async function fetchPrice(ticker) {
            if (ticker === 'SPCX') {
                return manualSpcxPrice !== null ? manualSpcxPrice : 166.84;
            }
            try {
                const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${API_KEY}`);
                const data = await response.json();
                if (data.c === 0 || !data.c) return null; 
                return data.c;
            } catch (error) {
                console.error(`Erreur ${ticker}:`, error);
                return null;
            }
        }

        async function updateDashboard() {
            const eurRate = await fetchExchangeRate();
            document.getElementById('exchange-rate-display').innerHTML = `EUR/USD : <span>${eurRate.toFixed(4)}</span>`;

            const container = document.getElementById('assets-container');
            container.innerHTML = ''; 

            let totalInvestedUsd = 0;
            let totalCurrentValueUsd = 0;

            for (const asset of portfolio) {
                const currentPriceUsd = await fetchPrice(asset.ticker);
                const priceToUseUsd = currentPriceUsd || asset.pru; 

                const investedValueUsd = asset.shares * asset.pru;
                const currentValueUsd = asset.shares * priceToUseUsd;
                const plValueUsd = currentValueUsd - investedValueUsd;
                const plPercent = (plValueUsd / investedValueUsd) * 100;

                const currentValueEur = currentValueUsd * eurRate;
                const plValueEur = plValueUsd * eurRate;

                totalInvestedUsd += investedValueUsd;
                totalCurrentValueUsd += currentValueUsd;

                const isUp = plValueUsd >= 0;
                const colorClass = isUp ? 'up' : 'down';
                const trendClass = isUp ? 'trend-up' : 'trend-down';
                const sign = isUp ? '+' : '';

                const strat = strategies[asset.ticker];
                let progressHtml = '';

                if (strat.targetPrice) {
                    const progress = Math.min((priceToUseUsd / strat.targetPrice) * 100, 100);
                    progressHtml = `
                        <div class="mini-progress-bar">
                            <div class="mini-progress-fill" style="width: ${progress}%;"></div>
                        </div>
                    `;
                }

                const card = document.createElement('div');
                card.className = 'asset-card';
                card.innerHTML = `
                    <div class="row-main">
                        <div class="ticker-info">
                            <span class="asset-ticker">${asset.ticker}</span>
                            <span class="asset-shares">${asset.shares.toFixed(3)} parts</span>
                        </div>
                        <div class="price-info">
                            <div class="asset-total-eur">${currentValueEur.toFixed(2)} €</div>
                            <div class="asset-total-usd">${currentValueUsd.toFixed(2)} $</div>
                        </div>
                    </div>

                    <div class="row-details">
                        <div class="market-data">
                            PRU: <span>${asset.pru.toFixed(2)}$</span> • Cours: <span>${priceToUseUsd.toFixed(2)}$</span>
                        </div>
                        <div class="pl-data ${colorClass}">
                            <span class="pl-usd">${sign}${plValueUsd.toFixed(1)}$</span>
                            <span>${sign}${plValueEur.toFixed(2)}€</span>
                            <span class="trend-badge ${trendClass}">${sign}${Math.abs(plPercent).toFixed(1)}%</span>
                        </div>
                    </div>

                    <div class="row-strategy">
                        <span class="strat-title">${strat.title}</span> ${strat.desc}
                        ${progressHtml}
                    </div>
                `;
                container.appendChild(card);
            }

            const totalCurrentValueEur = totalCurrentValueUsd * eurRate;
            const totalPlValueUsd = totalCurrentValueUsd - totalInvestedUsd;
            const totalPlValueEur = totalPlValueUsd * eurRate;
            const totalPlPercent = (totalPlValueUsd / totalInvestedUsd) * 100;
            const isTotalUp = totalPlValueUsd >= 0;

            document.getElementById('total-value-eur').innerText = `${totalCurrentValueEur.toFixed(2)} €`;
            document.getElementById('total-value-usd').innerText = `~ ${totalCurrentValueUsd.toFixed(2)} $`;
            
            const totalPlElement = document.getElementById('total-pl');
            totalPlElement.innerHTML = `
                ${isTotalUp ? '+' : ''}${totalPlValueEur.toFixed(2)} € 
                &nbsp;•&nbsp; ${isTotalUp ? '+' : ''}${totalPlPercent.toFixed(1)} %
            `;
            totalPlElement.className = `total-pl ${isTotalUp ? 'up' : 'down'}`;

            const now = new Date();
            document.getElementById('last-update').innerHTML = `Sync : <span>${now.toLocaleTimeString('fr-FR').slice(0, 5)}</span>`;
        }

        updateDashboard();
        setInterval(updateDashboard, 60000); 

    </script>
</body>
</html>

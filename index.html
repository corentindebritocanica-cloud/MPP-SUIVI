<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Portfolio</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #000000;
  --bg2:        #1c1c1e;
  --bg3:        #2c2c2e;
  --sep:        rgba(255,255,255,.1);
  --text:       #ffffff;
  --text2:      rgba(255,255,255,.55);
  --text3:      rgba(255,255,255,.3);
  --green:      #30d158;
  --red:        #ff453a;
  --blue:       #0a84ff;
  --r:          14px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
  -webkit-font-smoothing: antialiased;
  padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 40px);
  min-height: 100svh;
}

/* ── SCROLL WRAPPER ── */
.scroll { padding: 0 16px 32px; max-width: 430px; margin: 0 auto; }

/* ── STATUS BAR SPACER ── */
.topbar { height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
.topbar-title { font-size: 17px; font-weight: 600; letter-spacing: -.3px; }
.topbar-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--bg2); border: none; color: var(--text2);
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.topbar-btn:active { background: var(--bg3); }

/* ── HERO ── */
.hero { text-align: center; padding: 8px 0 32px; }
.hero-label { font-size: 13px; font-weight: 500; color: var(--text2); letter-spacing: .3px; margin-bottom: 6px; }
.hero-value { font-size: 52px; font-weight: 700; letter-spacing: -2px; line-height: 1; }
.hero-pnl   { font-size: 17px; font-weight: 500; margin-top: 6px; }
.hero-time  { font-size: 12px; color: var(--text3); margin-top: 4px; }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 13px; font-weight: 600; color: var(--text2);
  letter-spacing: .5px; text-transform: uppercase;
  margin: 24px 0 8px;
}

/* ── LIST CARD ── */
.list {
  background: var(--bg2);
  border-radius: var(--r);
  overflow: hidden;
}
.list-row {
  display: flex; align-items: center;
  padding: 14px 16px; gap: 12px;
  position: relative;
}
.list-row + .list-row::before {
  content: '';
  position: absolute; top: 0; left: 60px; right: 0;
  height: 1px; background: var(--sep);
}

/* icone ticker */
.ticker-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: var(--text); flex-shrink: 0;
  letter-spacing: -.5px;
}
.icon-ttwo { background: #1a1aff; }
.icon-sony { background: #1a1a1a; border: 1px solid rgba(255,255,255,.12); }
.icon-nvda { background: #76b900; }

.row-mid { flex: 1; min-width: 0; }
.row-name  { font-size: 15px; font-weight: 600; letter-spacing: -.2px; }
.row-sub   { font-size: 13px; color: var(--text2); margin-top: 1px; }

.row-right { text-align: right; flex-shrink: 0; }
.row-val   { font-size: 15px; font-weight: 600; letter-spacing: -.2px; }
.row-chg   { font-size: 13px; margin-top: 1px; font-weight: 500; }

/* ── STATS GRID ── */
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.stat-card {
  background: var(--bg2); border-radius: var(--r);
  padding: 14px 16px;
}
.stat-label { font-size: 12px; color: var(--text2); font-weight: 500; margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 700; letter-spacing: -.5px; }

/* ── GTA BANNER ── */
.gta-banner {
  background: var(--bg2); border-radius: var(--r);
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.gta-left { display: flex; align-items: center; gap: 12px; }
.gta-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, #ff6b35, #ff2d55);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.gta-label { font-size: 13px; font-weight: 600; }
.gta-sub   { font-size: 12px; color: var(--text2); margin-top: 1px; }
.gta-countdown { font-size: 15px; font-weight: 700; color: var(--blue); white-space: nowrap; }

/* ── REFRESH ROW ── */
.refresh-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0 0;
}
.refresh-text { font-size: 12px; color: var(--text3); }
.refresh-pill {
  background: var(--bg2); border: none; color: var(--blue);
  font-family: inherit; font-size: 13px; font-weight: 600;
  padding: 6px 14px; border-radius: 20px; cursor: pointer;
  transition: opacity .15s;
}
.refresh-pill:active { opacity: .6; }

/* ── LOADER ── */
.loader {
  position: fixed; inset: 0; background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; z-index: 99; transition: opacity .3s;
}
.loader-spinner {
  width: 28px; height: 28px;
  border: 2.5px solid rgba(255,255,255,.15);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 13px; color: rgba(255,255,255,.4); font-weight: 500; }

/* ── ERROR ── */
.error-banner {
  background: rgba(255,69,58,.12);
  border-radius: var(--r); padding: 12px 16px;
  font-size: 13px; color: var(--red); font-weight: 500;
  display: none; line-height: 1.5;
}

/* ── COLORS ── */
.green  { color: var(--green); }
.red    { color: var(--red);   }
.blue   { color: var(--blue);  }
.muted  { color: var(--text2); }

/* ── FX ROW ── */
.fx-row {
  background: var(--bg2); border-radius: var(--r);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.fx-label { font-size: 13px; color: var(--text2); font-weight: 500; }
.fx-value { font-size: 15px; font-weight: 600; }
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="loader-spinner"></div>
  <div class="loader-text">Chargement…</div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <span class="topbar-title">Portfolio</span>
  <button class="topbar-btn" onclick="manualRefresh()" title="Rafraîchir">↺</button>
</div>

<div class="scroll">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-label">VALEUR TOTALE</div>
    <div class="hero-value" id="hero-val">— €</div>
    <div class="hero-pnl"  id="hero-pnl">—</div>
    <div class="hero-time" id="hero-time">—</div>
  </div>

  <!-- ERROR -->
  <div class="error-banner" id="err"></div>

  <!-- POSITIONS -->
  <div class="section-label">Positions</div>
  <div class="list" id="list"></div>

  <!-- STATS -->
  <div class="section-label">Récapitulatif</div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Investi</div>
      <div class="stat-value" id="s-cost">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">+/- latent</div>
      <div class="stat-value" id="s-pnl">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Performance</div>
      <div class="stat-value" id="s-pct">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">EUR / USD</div>
      <div class="stat-value muted" id="s-fx">—</div>
    </div>
  </div>

  <!-- GTA VI -->
  <div class="section-label">Catalyseur</div>
  <div class="gta-banner">
    <div class="gta-left">
      <div class="gta-icon">🎮</div>
      <div>
        <div class="gta-label">GTA VI</div>
        <div class="gta-sub">19 novembre 2026</div>
      </div>
    </div>
    <div class="gta-countdown" id="gta">…</div>
  </div>

  <!-- REFRESH -->
  <div class="refresh-row">
    <span class="refresh-text" id="next-refresh">Prochain refresh dans 60s</span>
    <button class="refresh-pill" onclick="manualRefresh()">Actualiser</button>
  </div>

  <!-- FX -->
  <div style="margin-top:10px">
    <div class="fx-row">
      <span class="fx-label">Taux de change live</span>
      <span class="fx-value" id="fx-live">—</span>
    </div>
  </div>

</div><!-- /scroll -->

<script>
// ══════════════════════════════════════════════
//  CONFIG — modifier ici si les positions changent
// ══════════════════════════════════════════════
const API_KEY = 'd8nou8hr01qvvn99oe20d8nou8hr01qvvn99oe2g';
const HOLDINGS = [
  { ticker:'TTWO', label:'Take-Two',  sub:'2,34 actions', qty:2.34,  cost:207.00, icon:'T2',  cls:'icon-ttwo' },
  { ticker:'SONY', label:'Sony',      sub:'1,88 actions', qty:1.88,  cost:20.04,  icon:'SNY', cls:'icon-sony' },
  { ticker:'NVDA', label:'NVIDIA',    sub:'0,17 actions', qty:0.17,  cost:210.00, icon:'NV',  cls:'icon-nvda' },
];
// ══════════════════════════════════════════════

let EURUSD   = 1.09;
let timerSec = 60;

const f  = (n, d=2) => (+n).toLocaleString('fr-FR', { minimumFractionDigits:d, maximumFractionDigits:d });
const sg = n => n >= 0 ? '+' : '';
const cl = n => n > 0 ? 'green' : n < 0 ? 'red' : 'muted';

async function getQuote(ticker) {
  const r = await fetch(
    `https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${API_KEY}`,
    { signal: AbortSignal.timeout(8000) }
  );
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  if (!d.c) throw new Error(`Pas de données pour ${ticker}`);
  return { price: d.c, prev: d.pc, high: d.h, low: d.l };
}

async function getEURUSD() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD', { signal: AbortSignal.timeout(5000) });
    const d = await r.json();
    if (d?.rates?.EUR) EURUSD = 1 / d.rates.EUR;
  } catch(_) {}
}

function buildRow(h, q, totalUSD) {
  const dayChg = q.price - q.prev;
  const dayPct = (dayChg / q.prev) * 100;
  const valEUR = (q.price * h.qty) / EURUSD;
  const pnlPct = ((q.price - h.cost) / h.cost) * 100;

  return `
  <div class="list-row">
    <div class="ticker-icon ${h.cls}">${h.icon}</div>
    <div class="row-mid">
      <div class="row-name">${h.label}</div>
      <div class="row-sub">${h.sub} · ${f(q.price)} $</div>
    </div>
    <div class="row-right">
      <div class="row-val">${f(valEUR)} €</div>
      <div class="row-chg ${cl(dayPct)}">${sg(dayPct)}${f(dayPct)}%</div>
    </div>
  </div>`;
}

async function refresh() {
  document.getElementById('err').style.display = 'none';
  try {
    await getEURUSD();
    const quotes = await Promise.all(HOLDINGS.map(h => getQuote(h.ticker)));

    const totUSD  = HOLDINGS.reduce((s,h,i) => s + quotes[i].price * h.qty, 0);
    const costUSD = HOLDINGS.reduce((s,h)   => s + h.cost * h.qty, 0);
    const totEUR  = totUSD  / EURUSD;
    const costEUR = costUSD / EURUSD;
    const pnlEUR  = totEUR - costEUR;
    const pnlPct  = (pnlEUR / costEUR) * 100;

    // Liste
    document.getElementById('list').innerHTML =
      HOLDINGS.map((h,i) => buildRow(h, quotes[i], totUSD)).join('');

    // Hero
    document.getElementById('hero-val').textContent = f(totEUR) + ' €';
    const pnlEl = document.getElementById('hero-pnl');
    pnlEl.textContent = `${sg(pnlEUR)}${f(pnlEUR)} €  (${sg(pnlPct)}${f(pnlPct)}%)`;
    pnlEl.className = 'hero-pnl ' + cl(pnlPct);
    document.getElementById('hero-time').textContent =
      'Mis à jour à ' + new Date().toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});

    // Stats
    document.getElementById('s-cost').textContent = f(costEUR) + ' €';
    const spEl = document.getElementById('s-pnl');
    spEl.textContent = `${sg(pnlEUR)}${f(pnlEUR)} €`;
    spEl.className = 'stat-value ' + cl(pnlEUR);
    const sppEl = document.getElementById('s-pct');
    sppEl.textContent = `${sg(pnlPct)}${f(pnlPct)} %`;
    sppEl.className = 'stat-value ' + cl(pnlPct);
    document.getElementById('s-fx').textContent = f(EURUSD, 4);
    document.getElementById('fx-live').textContent = `1 € = ${f(EURUSD,4)} $`;

    // Masquer loader
    const l = document.getElementById('loader');
    l.style.opacity = '0';
    setTimeout(() => l.style.display = 'none', 300);

  } catch(err) {
    const eb = document.getElementById('err');
    eb.style.display = 'block';
    eb.textContent = '⚠ ' + err.message + ' — vérifiez votre connexion.';
    const l = document.getElementById('loader');
    l.style.opacity = '0';
    setTimeout(() => l.style.display = 'none', 300);
  }
}

function manualRefresh() {
  timerSec = 60;
  const l = document.getElementById('loader');
  l.style.display = 'flex'; l.style.opacity = '1';
  refresh();
}

// Timer
setInterval(() => {
  timerSec--;
  document.getElementById('next-refresh').textContent =
    timerSec > 0 ? `Prochain refresh dans ${timerSec}s` : 'Mise à jour…';
  if (timerSec <= 0) { timerSec = 60; refresh(); }
}, 1000);

// GTA VI
function tickGTA() {
  const diff = new Date('2026-11-19T00:00:00') - new Date();
  if (diff <= 0) { document.getElementById('gta').textContent = '🎉 Sorti !'; return; }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  document.getElementById('gta').textContent = `J-${d} · ${h}h${m}m`;
}
tickGTA();
setInterval(tickGTA, 30000);

refresh();
</script>
</body>
</html>

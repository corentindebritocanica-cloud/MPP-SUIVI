<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Trading</title>
    <style>
        :root {
            --bg-color: #0b1426;
            --card-bg: #1c273c;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --green: #10b981;
            --red: #ef4444;
            --accent: #3b82f6;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px; /* Légèrement élargi pour la double devise */
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 16px;
            color: var(--text-muted);
            margin: 0 0 10px 0;
            font-weight: normal;
        }

        .total-value-usd {
            font-size: 42px;
            font-weight: bold;
            margin: 0;
        }

        .total-value-eur {
            font-size: 24px;
            color: var(--text-muted);
            margin-top: 5px;
            margin-bottom: 10px;
        }

        .total-pl {
            font-size: 16px;
            font-weight: 500;
        }

        .asset-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .asset-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .asset-info {
            display: flex;
            flex-direction: column;
        }

        .asset-ticker {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .asset-shares {
            font-size: 13px;
            color: var(--text-muted);
        }

        .asset-numbers {
            text-align: right;
            display: flex;
            flex-direction: column;
        }

        .asset-price {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .asset-pl {
            font-size: 14px;
            font-weight: 500;
        }

        .eur-text {
            color: var(--text-muted);
            font-size: 0.85em;
            font-weight: normal;
        }

        .strategy-box {
            background-color: rgba(11, 20, 38, 0.5);
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .strategy-title {
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 6px;
            display: block;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background-color: #2d3748;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--accent);
            transition: width 0.5s ease;
        }

        .up { color: var(--green); }
        .down { color: var(--red); }
        
        .footer-info {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Solde du Portefeuille</h1>
            <div id="total-value-usd" class="total-value-usd">Chargement...</div>
            <div id="total-value-eur" class="total-value-eur">-- €</div>
            <div id="total-pl" class="total-pl">--</div>
        </div>

        <div id="assets-container">
            </div>

        <div class="footer-info">
            <div id="exchange-rate-display">Taux EUR/USD : --</div>
            <div id="last-update">Dernière mise à jour : --</div>
        </div>
    </div>

    <script>
        // 🚨 CLÉ API (Finnhub) pour les actions
        const API_KEY = 'demo'; 

        const portfolio = [
            { ticker: 'TTWO', name: 'Take-Two', shares: 1.72064278, pru: 211.68 },
            { ticker: 'SPCX', name: 'SpaceX', shares: 1.00000000, pru: 135.00 },
            { ticker: 'NVDA', name: 'NVIDIA', shares: 0.34674018, pru: 210.04 }
        ];

        const strategies = {
            'TTWO': { 
                title: '🎯 ORDRE LIMIT EN ATTENTE', 
                desc: 'Vente de 1 part auto. à 250$.',
                targetPrice: 250 
            },
            'SPCX': { 
                title: '💎 COFFRE-FORT (HOLD)', 
                desc: 'Objectif Jackpot long terme.',
                targetPrice: null 
            },
            'NVDA': { 
                title: '⏳ EN SOMMEIL (HOLD)', 
                desc: 'Attente du cash TTWO pour renforcer.',
                targetPrice: null 
            }
        };

        // Fonction pour récupérer le taux de change USD vers EUR
        async function fetchExchangeRate() {
            try {
                // Utilisation d'une API gratuite sans clé pour les devises
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                return data.rates.EUR;
            } catch (error) {
                console.error("Erreur taux de change:", error);
                return 0.93; // Taux de secours approximatif en cas d'échec de l'API
            }
        }

        async function fetchPrice(ticker) {
            try {
                const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${API_KEY}`);
                const data = await response.json();
                
                if (data.c === 0 || !data.c) {
                    return ticker === 'SPCX' ? 166.84 : null; 
                }
                return data.c;
            } catch (error) {
                console.error(`Erreur pour ${ticker}:`, error);
                return null;
            }
        }

        async function updateDashboard() {
            // 1. Récupération du taux de change en premier
            const eurRate = await fetchExchangeRate();
            document.getElementById('exchange-rate-display').innerText = `1 USD = ${eurRate.toFixed(4)} EUR`;

            const container = document.getElementById('assets-container');
            container.innerHTML = ''; 

            let totalInvestedUsd = 0;
            let totalCurrentValueUsd = 0;

            for (const asset of portfolio) {
                const currentPriceUsd = await fetchPrice(asset.ticker);
                const priceToUseUsd = currentPriceUsd || asset.pru; 

                // Calculs en USD
                const investedValueUsd = asset.shares * asset.pru;
                const currentValueUsd = asset.shares * priceToUseUsd;
                const plValueUsd = currentValueUsd - investedValueUsd;
                const plPercent = (plValueUsd / investedValueUsd) * 100;

                // Conversion en EUR
                const priceToUseEur = priceToUseUsd * eurRate;
                const plValueEur = plValueUsd * eurRate;

                totalInvestedUsd += investedValueUsd;
                totalCurrentValueUsd += currentValueUsd;

                const isUp = plValueUsd >= 0;
                const colorClass = isUp ? 'up' : 'down';
                const sign = isUp ? '+' : '';

                const strat = strategies[asset.ticker];
                let progressHtml = '';

                if (strat.targetPrice) {
                    const progress = Math.min((priceToUseUsd / strat.targetPrice) * 100, 100);
                    progressHtml = `
                        <div style="font-size: 11px; margin-top: 8px; color: #8b9bb4;">Progression (Cible: ${strat.targetPrice}$) : ${progress.toFixed(1)}%</div>
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${progress}%;"></div>
                        </div>
                    `;
                }

                const card = document.createElement('div');
                card.className = 'asset-card';
                card.innerHTML = `
                    <div class="asset-main">
                        <div class="asset-info">
                            <span class="asset-ticker">${asset.ticker}</span>
                            <span class="asset-shares">${asset.shares.toFixed(4)} parts</span>
                        </div>
                        <div class="asset-numbers">
                            <span class="asset-price">${priceToUseUsd.toFixed(2)} $ <span class="eur-text">(${priceToUseEur.toFixed(2)} €)</span></span>
                            <span class="asset-pl ${colorClass}">${sign}${plValueUsd.toFixed(2)} $ <span class="eur-text">(${sign}${plValueEur.toFixed(2)} €)</span></span>
                        </div>
                    </div>
                    <div class="strategy-box">
                        <span class="strategy-title">${strat.title}</span>
                        ${strat.desc}
                        ${progressHtml}
                    </div>
                `;
                container.appendChild(card);
            }

            // Calculs globaux
            const totalCurrentValueEur = totalCurrentValueUsd * eurRate;
            const totalPlValueUsd = totalCurrentValueUsd - totalInvestedUsd;
            const totalPlValueEur = totalPlValueUsd * eurRate;
            const totalPlPercent = (totalPlValueUsd / totalInvestedUsd) * 100;
            const isTotalUp = totalPlValueUsd >= 0;

            // Affichage des Totaux
            document.getElementById('total-value-usd').innerText = `${totalCurrentValueUsd.toFixed(2)} $`;
            document.getElementById('total-value-eur').innerText = `~ ${totalCurrentValueEur.toFixed(2)} €`;
            
            const totalPlElement = document.getElementById('total-pl');
            totalPlElement.innerHTML = `
                ${isTotalUp ? '+' : ''}${totalPlValueUsd.toFixed(2)} $ 
                <span class="eur-text">(${isTotalUp ? '+' : ''}${totalPlValueEur.toFixed(2)} €)</span> 
                | ${isTotalUp ? '+' : ''}${totalPlPercent.toFixed(2)} %
            `;
            totalPlElement.className = `total-pl ${isTotalUp ? 'up' : 'down'}`;

            // Horodatage
            const now = new Date();
            document.getElementById('last-update').innerText = `Dernière mise à jour : ${now.toLocaleTimeString('fr-FR')}`;
        }

        updateDashboard();
        setInterval(updateDashboard, 60000); // Mise à jour toutes les minutes

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:       #0a0a0f;
    --surface:  #111118;
    --border:   #1e1e2e;
    --muted:    #3a3a50;
    --text:     #e8e8f0;
    --sub:      #6b6b8a;
    --green:    #3ddc84;
    --red:      #ff5f6d;
    --accent:   #5c6bc0;
    --gold:     #c9a84c;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    min-height: 100vh;
    padding: 24px 16px 40px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 32px;
  }
  .brand { font-size: 11px; color: var(--sub); letter-spacing: 0.18em; text-transform: uppercase; }
  .total-label { font-size: 11px; color: var(--sub); letter-spacing: 0.12em; margin-bottom: 4px; }
  .total-value { font-size: 36px; font-weight: 700; letter-spacing: -0.02em; }
  .total-perf { font-size: 13px; margin-top: 4px; }
  .refresh-info { text-align: right; }
  .refresh-info span { font-size: 10px; color: var(--sub); display: block; }
  #countdown { font-size: 18px; color: var(--accent); font-weight: 700; }
  #last-update { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* ── DIVIDER ── */
  hr { border: none; border-top: 1px solid var(--border); margin: 0 0 24px; }

  /* ── CARDS GRID ── */
  .cards { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 28px; }
  @media(min-width:600px){ .cards { grid-template-columns: 1fr 1fr; } }
  @media(min-width:900px){ .cards { grid-template-columns: 1fr 1fr 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    transition: border-color .2s;
  }
  .card:hover { border-color: var(--muted); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .ticker { font-size: 13px; font-weight: 700; letter-spacing: 0.1em; color: var(--accent); }
  .company { font-size: 10px; color: var(--sub); margin-top: 2px; letter-spacing: 0.05em; }
  .badge {
    font-size: 10px; font-weight: 700; padding: 3px 8px;
    border-radius: 20px; letter-spacing: 0.08em;
  }
  .badge.up   { background: rgba(61,220,132,.12); color: var(--green); }
  .badge.down { background: rgba(255,95,109,.12);  color: var(--red); }
  .badge.flat { background: rgba(107,107,138,.12); color: var(--sub); }

  .price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .price { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; }
  .price-currency { font-size: 12px; color: var(--sub); }
  .price-change { font-size: 12px; }
  .price-change.up   { color: var(--green); }
  .price-change.down { color: var(--red); }

  .divider-mini { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-label { font-size: 9px; color: var(--sub); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 3px; }
  .stat-value { font-size: 14px; font-weight: 600; }
  .stat-value.up   { color: var(--green); }
  .stat-value.down { color: var(--red); }
  .stat-value.neutral { color: var(--text); }

  /* bar de poids */
  .weight-bar-track {
    height: 3px; background: var(--border); border-radius: 2px; margin-top: 14px;
  }
  .weight-bar-fill {
    height: 3px; border-radius: 2px; background: var(--accent); transition: width .4s;
  }
  .weight-label { font-size: 9px; color: var(--muted); text-align: right; margin-top: 4px; }

  /* spinner */
  .loading-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 99; transition: opacity .4s;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 12px; color: var(--sub); letter-spacing: 0.12em; }

  /* ── SUMMARY BAR ── */
  .summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex; flex-wrap: wrap; gap: 20px;
  }
  .summary-item { flex: 1; min-width: 120px; }
  .summary-item .s-label { font-size: 9px; color: var(--sub); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
  .summary-item .s-val   { font-size: 16px; font-weight: 700; }

  /* ── ERROR ── */
  .error-msg { font-size: 11px; color: var(--red); margin-top: 6px; display: none; }

  /* pulse quand refresh */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .refreshing .price { animation: pulse .6s ease-in-out 2; }

  /* GTA countdown banner */
  .banner {
    background: linear-gradient(90deg, rgba(92,107,192,.15), rgba(201,168,76,.08));
    border: 1px solid rgba(201,168,76,.2);
    border-radius: 10px;
    padding: 12px 18px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
    font-size: 12px;
  }
  .banner-icon { font-size: 20px; }
  .banner-label { color: var(--sub); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  .banner-val { color: var(--gold); font-weight: 700; font-size: 15px; }
</style>
</head>
<body>

<div class="loading-overlay" id="loader">
  <div class="spinner"></div>
  <div class="loading-text">CHARGEMENT DES COURS…</div>
</div>

<header>
  <div>
    <div class="brand">Portfolio Tracker</div>
    <div class="total-label" style="margin-top:14px;">VALEUR TOTALE</div>
    <div class="total-value" id="total-eur">— €</div>
    <div class="total-perf" id="total-perf">—</div>
  </div>
  <div class="refresh-info">
    <span>Actualisation dans</span>
    <div id="countdown">60</div>
    <span id="last-update">—</span>
  </div>
</header>

<hr>

<!-- GTA VI countdown -->
<div class="banner">
  <div class="banner-icon">🎮</div>
  <div>
    <div class="banner-label">GTA VI — 19 nov 2026</div>
    <div class="banner-val" id="gta-countdown">calcul…</div>
  </div>
</div>

<!-- Cards -->
<div class="cards" id="cards-container"></div>

<!-- Summary -->
<div class="summary" id="summary">
  <div class="summary-item">
    <div class="s-label">Investi (coût)</div>
    <div class="s-val" id="sum-cost">—</div>
  </div>
  <div class="summary-item">
    <div class="s-label">Valeur actuelle</div>
    <div class="s-val" id="sum-value">—</div>
  </div>
  <div class="summary-item">
    <div class="s-label">+/- latent €</div>
    <div class="s-val" id="sum-pnl">—</div>
  </div>
  <div class="summary-item">
    <div class="s-label">+/- latent %</div>
    <div class="s-val" id="sum-pnl-pct">—</div>
  </div>
</div>

<script>
// ─── CONFIGURATION DU PORTEFEUILLE ─────────────────────────────────────────
// Modifie ici si tu changes tes positions
const PORTFOLIO = [
  { ticker: 'TTWO',  name: 'Take-Two Interactive', qty: 2.34,  costUSD: 207.00 },
  { ticker: 'SONY',  name: 'Sony Group Corp.',      qty: 1.88,  costUSD:  20.10 },
  { ticker: 'NVDA',  name: 'NVIDIA Corporation',    qty: 0.17,  costUSD: 210.00 },
];

// Taux EUR/USD fixe de secours (sera remplacé par le live)
let EUR_USD = 1.085;

// ─── PROXY Yahoo Finance (évite CORS) ──────────────────────────────────────
// On utilise un proxy public gratuit no-cors-compatible
async function fetchQuote(ticker) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1m&range=1d`;
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const res = await fetch(proxy);
  const json = await res.json();
  const data = JSON.parse(json.contents);
  const meta = data.chart.result[0].meta;
  return {
    price:         meta.regularMarketPrice,
    prevClose:     meta.chartPreviousClose || meta.previousClose,
    currency:      meta.currency,
    marketState:   meta.marketState, // REGULAR / PRE / POST / CLOSED
  };
}

async function fetchEURUSD() {
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/EURUSD=X?interval=1m&range=1d`;
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy);
    const json = await res.json();
    const data = JSON.parse(json.contents);
    EUR_USD = data.chart.result[0].meta.regularMarketPrice;
  } catch(e) { /* utilise valeur par défaut */ }
}

// ─── RENDU ─────────────────────────────────────────────────────────────────
function sign(n) { return n >= 0 ? '+' : ''; }
function cls(n)  { return n > 0 ? 'up' : n < 0 ? 'down' : 'flat'; }
function fmt(n, dec=2) { return n.toLocaleString('fr-FR', {minimumFractionDigits:dec, maximumFractionDigits:dec}); }

function buildCard(item, quote, totalValueUSD) {
  const { ticker, name, qty, costUSD } = item;
  const { price, prevClose, marketState } = quote;

  const changeDay   = price - prevClose;
  const changePct   = (changeDay / prevClose) * 100;
  const valueUSD    = price * qty;
  const valueEUR    = valueUSD / EUR_USD;
  const costEUR     = costUSD * qty / EUR_USD;
  const pnlEUR      = valueEUR - costEUR;
  const pnlPct      = ((price - costUSD) / costUSD) * 100;
  const weight      = (valueUSD / totalValueUSD) * 100;

  const stateLabel  = marketState === 'REGULAR' ? '● LIVE' : marketState === 'PRE' ? '◐ PRÉ' : '○ FERMÉ';

  const badgeCls = cls(changePct);

  return `
  <div class="card" id="card-${ticker}">
    <div class="card-top">
      <div>
        <div class="ticker">${ticker} <span style="font-size:9px;color:var(--muted);font-weight:400;">${stateLabel}</span></div>
        <div class="company">${name}</div>
      </div>
      <div class="badge ${badgeCls}">${sign(changePct)}${fmt(changePct)}%</div>
    </div>

    <div class="price-row">
      <div class="price">${fmt(price)}</div>
      <div class="price-currency">USD</div>
    </div>
    <div class="price-change ${cls(changeDay)}">${sign(changeDay)}${fmt(changeDay)} $ aujourd'hui</div>

    <hr class="divider-mini">

    <div class="stats">
      <div>
        <div class="stat-label">Quantité</div>
        <div class="stat-value neutral">${qty}</div>
      </div>
      <div>
        <div class="stat-label">Valeur</div>
        <div class="stat-value neutral">${fmt(valueEUR)} €</div>
      </div>
      <div>
        <div class="stat-label">+/- jour</div>
        <div class="stat-value ${cls(changeDay)}">${sign(changeDay*qty/EUR_USD)}${fmt(changeDay*qty/EUR_USD)} €</div>
      </div>
      <div>
        <div class="stat-label">+/- total</div>
        <div class="stat-value ${cls(pnlPct)}">${sign(pnlPct)}${fmt(pnlPct)}%</div>
      </div>
    </div>

    <div class="weight-bar-track">
      <div class="weight-bar-fill" style="width:${Math.min(weight,100)}%"></div>
    </div>
    <div class="weight-label">${fmt(weight,1)}% du portefeuille</div>
  </div>`;
}

async function refresh() {
  document.getElementById('cards-container').classList.add('refreshing');
  try {
    await fetchEURUSD();
    const quotes = await Promise.all(PORTFOLIO.map(p => fetchQuote(p.ticker)));

    const totalValueUSD = PORTFOLIO.reduce((s, p, i) => s + quotes[i].price * p.qty, 0);
    const totalCostUSD  = PORTFOLIO.reduce((s, p) => s + p.costUSD * p.qty, 0);
    const totalValueEUR = totalValueUSD / EUR_USD;
    const totalCostEUR  = totalCostUSD  / EUR_USD;
    const totalPnlEUR   = totalValueEUR - totalCostEUR;
    const totalPnlPct   = (totalPnlEUR / totalCostEUR) * 100;

    // Cards
    document.getElementById('cards-container').innerHTML =
      PORTFOLIO.map((p, i) => buildCard(p, quotes[i], totalValueUSD)).join('');

    // Header total
    document.getElementById('total-eur').textContent = fmt(totalValueEUR) + ' €';
    const perfEl = document.getElementById('total-perf');
    perfEl.textContent = `${sign(totalPnlEUR)}${fmt(totalPnlEUR)} € (${sign(totalPnlPct)}${fmt(totalPnlPct)}%)`;
    perfEl.style.color = totalPnlPct >= 0 ? 'var(--green)' : 'var(--red)';

    // Summary
    document.getElementById('sum-cost').textContent   = fmt(totalCostEUR) + ' €';
    document.getElementById('sum-value').textContent  = fmt(totalValueEUR) + ' €';
    const pnlEl = document.getElementById('sum-pnl');
    pnlEl.textContent = `${sign(totalPnlEUR)}${fmt(totalPnlEUR)} €`;
    pnlEl.style.color = totalPnlPct >= 0 ? 'var(--green)' : 'var(--red)';
    const pnlPEl = document.getElementById('sum-pnl-pct');
    pnlPEl.textContent = `${sign(totalPnlPct)}${fmt(totalPnlPct)} %`;
    pnlPEl.style.color = totalPnlPct >= 0 ? 'var(--green)' : 'var(--red)';

    // Last update
    document.getElementById('last-update').textContent =
      'Mis à jour ' + new Date().toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});

    // Cacher loader
    const loader = document.getElementById('loader');
    if (loader.style.display !== 'none') {
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 400);
    }
  } catch(err) {
    console.error(err);
    document.getElementById('last-update').textContent = '⚠ Erreur de chargement';
  }
  document.getElementById('cards-container').classList.remove('refreshing');
}

// ─── COUNTDOWN 60s ─────────────────────────────────────────────────────────
let seconds = 60;
function tick() {
  document.getElementById('countdown').textContent = seconds + 's';
  if (seconds <= 0) {
    seconds = 60;
    refresh();
  }
  seconds--;
}
setInterval(tick, 1000);

// ─── GTA VI COUNTDOWN ──────────────────────────────────────────────────────
function updateGTA() {
  const target = new Date('2026-11-19T00:00:00');
  const now    = new Date();
  const diff   = target - now;
  if (diff <= 0) { document.getElementById('gta-countdown').textContent = '🎉 SORTI !'; return; }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000)  / 60000);
  document.getElementById('gta-countdown').textContent = `J-${d}  ${h}h ${m}min`;
}
updateGTA();
setInterval(updateGTA, 60000);

// ─── INIT ──────────────────────────────────────────────────────────────────
refresh();
</script>
</body>
</html>

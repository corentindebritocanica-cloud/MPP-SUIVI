<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Trading</title>
    <style>
        :root {
            --bg-color: #0b1426;
            --card-bg: #1c273c;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --green: #10b981;
            --red: #ef4444;
            --accent: #3b82f6;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 16px;
            color: var(--text-muted);
            margin: 0 0 10px 0;
            font-weight: normal;
        }

        .total-value {
            font-size: 42px;
            font-weight: bold;
            margin: 0;
        }

        .total-pl {
            font-size: 16px;
            margin-top: 5px;
            font-weight: 500;
        }

        .asset-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .asset-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .asset-info {
            display: flex;
            flex-direction: column;
        }

        .asset-ticker {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .asset-shares {
            font-size: 13px;
            color: var(--text-muted);
        }

        .asset-numbers {
            text-align: right;
            display: flex;
            flex-direction: column;
        }

        .asset-price {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .asset-pl {
            font-size: 14px;
            font-weight: 500;
        }

        .strategy-box {
            background-color: rgba(11, 20, 38, 0.5);
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .strategy-title {
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 6px;
            display: block;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background-color: #2d3748;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--accent);
            transition: width 0.5s ease;
        }

        .up { color: var(--green); }
        .down { color: var(--red); }
        
        .last-update {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Solde du Portefeuille (USD)</h1>
            <div id="total-value" class="total-value">Chargement...</div>
            <div id="total-pl" class="total-pl">--</div>
        </div>

        <div id="assets-container">
            <!-- Injecté via JS -->
        </div>

        <div class="last-update" id="last-update">Dernière mise à jour : --</div>
    </div>

    <script>
        // 🚨 CLÉ API (Finnhub)
        const API_KEY = 'demo'; 

        const portfolio = [
            { ticker: 'TTWO', name: 'Take-Two', shares: 1.72064278, pru: 211.68 },
            { ticker: 'SPCX', name: 'SpaceX', shares: 1.00000000, pru: 135.00 },
            { ticker: 'NVDA', name: 'NVIDIA', shares: 0.34674018, pru: 210.04 }
        ];

        // Définition de notre plan de match pour chaque ligne
        const strategies = {
            'TTWO': { 
                title: '🎯 ORDRE LIMIT EN ATTENTE', 
                desc: 'Vente automatique de 1 part programmée à 250$.',
                targetPrice: 250 
            },
            'SPCX': { 
                title: '💎 COFFRE-FORT (HOLD)', 
                desc: 'Objectif Jackpot long terme (3 à 10 ans).',
                targetPrice: null 
            },
            'NVDA': { 
                title: '⏳ EN SOMMEIL (HOLD)', 
                desc: 'Attente déclenchement TTWO pour renforcer la ligne.',
                targetPrice: null 
            }
        };

        async function fetchPrice(ticker) {
            try {
                const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${API_KEY}`);
                const data = await response.json();
                
                if (data.c === 0 || !data.c) {
                    return ticker === 'SPCX' ? 166.84 : null; 
                }
                return data.c;
            } catch (error) {
                console.error(`Erreur pour ${ticker}:`, error);
                return null;
            }
        }

        async function updateDashboard() {
            const container = document.getElementById('assets-container');
            container.innerHTML = ''; 

            let totalInvested = 0;
            let totalCurrentValue = 0;

            for (const asset of portfolio) {
                const currentPrice = await fetchPrice(asset.ticker);
                const priceToUse = currentPrice || asset.pru; 

                const investedValue = asset.shares * asset.pru;
                const currentValue = asset.shares * priceToUse;
                
                const plValue = currentValue - investedValue;
                const plPercent = (plValue / investedValue) * 100;

                totalInvested += investedValue;
                totalCurrentValue += currentValue;

                const isUp = plValue >= 0;
                const colorClass = isUp ? 'up' : 'down';
                const sign = isUp ? '+' : '';

                const strat = strategies[asset.ticker];
                let progressHtml = '';

                // Calcul de la barre de progression uniquement pour les actions avec un objectif (ex: TTWO)
                if (strat.targetPrice) {
                    const progress = Math.min((priceToUse / strat.targetPrice) * 100, 100);
                    progressHtml = `
                        <div style="font-size: 11px; margin-top: 8px; color: #8b9bb4;">Progression vers l'objectif : ${progress.toFixed(1)}%</div>
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${progress}%;"></div>
                        </div>
                    `;
                }

                const card = document.createElement('div');
                card.className = 'asset-card';
                card.innerHTML = `
                    <div class="asset-main">
                        <div class="asset-info">
                            <span class="asset-ticker">${asset.ticker}</span>
                            <span class="asset-shares">${asset.shares.toFixed(4)} parts</span>
                        </div>
                        <div class="asset-numbers">
                            <span class="asset-price">${priceToUse.toFixed(2)} $</span>
                            <span class="asset-pl ${colorClass}">${sign}${plValue.toFixed(2)} $ (${sign}${plPercent.toFixed(2)} %)</span>
                        </div>
                    </div>
                    <div class="strategy-box">
                        <span class="strategy-title">${strat.title}</span>
                        ${strat.desc}
                        ${progressHtml}
                    </div>
                `;
                container.appendChild(card);
            }

            const totalPlValue = totalCurrentValue - totalInvested;
            const totalPlPercent = (totalPlValue / totalInvested) * 100;
            const isTotalUp = totalPlValue >= 0;

            document.getElementById('total-value').innerText = `${totalCurrentValue.toFixed(2)} $`;
            
            const totalPlElement = document.getElementById('total-pl');
            totalPlElement.innerText = `${isTotalUp ? '+' : ''}${totalPlValue.toFixed(2)} $ (${isTotalUp ? '+' : ''}${totalPlPercent.toFixed(2)} %)`;
            totalPlElement.className = `total-pl ${isTotalUp ? 'up' : 'down'}`;

            const now = new Date();
            document.getElementById('last-update').innerText = `Dernière mise à jour : ${now.toLocaleTimeString('fr-FR')}`;
        }

        updateDashboard();

        // NOUVEAU : Mise à jour automatique toutes les 1 minute (60 000 millisecondes)
        setInterval(updateDashboard, 60000);

    </script>
</body>
</html>

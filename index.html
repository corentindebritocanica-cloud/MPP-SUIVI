<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal de Trading</title>
    <style>
        :root {
            --bg-color: #0b1426;
            --card-bg: #1c273c;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --green: #10b981;
            --red: #ef4444;
            --accent: #3b82f6;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 480px; 
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 16px;
            color: var(--text-muted);
            margin: 0 0 10px 0;
            font-weight: normal;
        }

        .total-value-eur {
            font-size: 42px;
            font-weight: bold;
            margin: 0;
        }

        .total-value-usd {
            font-size: 24px;
            color: var(--text-muted);
            margin-top: 5px;
            margin-bottom: 10px;
        }

        .total-pl {
            font-size: 16px;
            font-weight: 500;
        }

        .asset-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .asset-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .asset-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .asset-ticker {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .asset-shares {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        /* Nouveau style pour le prix d'achat */
        .asset-pru {
            font-size: 12px;
            color: var(--accent);
            font-weight: 500;
        }

        .asset-numbers {
            text-align: right;
            display: flex;
            flex-direction: column;
            margin-right: 15px;
        }

        .asset-price {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        /* Nouveau style pour étiquette Gain/Perte */
        .pl-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .asset-pl {
            font-size: 14px;
            font-weight: 500;
        }

        .usd-text {
            color: var(--text-muted);
            font-size: 0.85em;
            font-weight: normal;
        }

        /* --- BADGES ANIMÉS --- */
        @keyframes pulse-up {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        @keyframes pulse-down {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .trend-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 70px;
        }

        .trend-up {
            background-color: rgba(16, 185, 129, 0.15);
            color: var(--green);
            animation: pulse-up 2s infinite;
        }

        .trend-down {
            background-color: rgba(239, 68, 68, 0.15);
            color: var(--red);
            animation: pulse-down 2s infinite;
        }

        .strategy-box {
            background-color: rgba(11, 20, 38, 0.5);
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .strategy-title {
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 6px;
            display: block;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background-color: #2d3748;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--accent);
            transition: width 0.5s ease;
        }

        .up { color: var(--green); }
        .down { color: var(--red); }
        
        .footer-info {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 20px;
            line-height: 1.6;
            padding-bottom: 60px; 
        }

        /* --- WIDGET SPACEX --- */
        .spcx-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--card-bg);
            padding: 10px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .spcx-widget label {
            font-size: 12px;
            font-weight: bold;
            color: var(--text-muted);
        }

        .spcx-widget input {
            background-color: var(--bg-color);
            color: white;
            border: 1px solid #2d3748;
            padding: 6px 10px;
            border-radius: 6px;
            width: 80px;
            font-size: 14px;
            outline: none;
        }

        .spcx-widget input:focus {
            border-color: var(--accent);
        }

        .spcx-widget button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .spcx-widget button:hover {
            background-color: #2563eb;
        }

        @media (max-width: 400px) {
            .spcx-widget { bottom: 10px; right: 10px; padding: 8px 10px; gap: 5px; }
            .spcx-widget label { display: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Solde du Portefeuille</h1>
            <div id="total-value-eur" class="total-value-eur">Chargement...</div>
            <div id="total-value-usd" class="total-value-usd">-- $</div>
            <div id="total-pl" class="total-pl">--</div>
        </div>

        <div id="assets-container">
            </div>

        <div class="footer-info">
            <div id="exchange-rate-display">Taux EUR/USD : --</div>
            <div id="last-update">Dernière mise à jour : --</div>
        </div>
    </div>

    <div class="spcx-widget">
        <label>Ajuster SPCX</label>
        <input type="number" id="spcx-manual-input" step="0.01" placeholder="Ex: 166.84">
        <button onclick="applyManualSpcx()">Appliquer</button>
    </div>

    <script>
        const API_KEY = 'd8nou8hr01qvvn99oe20d8nou8hr01qvvn99oe2g'; 

        // Ton portefeuille propre (seulement les 3 actions actives)
        const portfolio = [
            { ticker: 'TTWO', name: 'Take-Two', shares: 1.72064278, pru: 211.68 },
            { ticker: 'SPCX', name: 'SpaceX', shares: 1.00000000, pru: 135.00 },
            { ticker: 'NVDA', name: 'NVIDIA', shares: 0.34674018, pru: 210.04 }
        ];

        const strategies = {
            'TTWO': { 
                title: '🎯 ORDRE LIMIT EN ATTENTE', 
                desc: 'Vente de 1 part auto. à 250$.',
                targetPrice: 250 
            },
            'SPCX': { 
                title: '💎 COFFRE-FORT (HOLD)', 
                desc: 'Objectif Jackpot long terme.',
                targetPrice: null 
            },
            'NVDA': { 
                title: '⏳ EN SOMMEIL (HOLD)', 
                desc: 'Attente du cash TTWO pour renforcer.',
                targetPrice: null 
            }
        };

        let manualSpcxPrice = null;

        function applyManualSpcx() {
            const inputVal = document.getElementById('spcx-manual-input').value;
            if (inputVal && !isNaN(inputVal)) {
                manualSpcxPrice = parseFloat(inputVal);
                updateDashboard(); 
            }
        }

        async function fetchExchangeRate() {
            try {
                const response = await fetch('https://api.coinbase.com/v2/exchange-rates?currency=USD');
                const data = await response.json();
                return parseFloat(data.data.rates.EUR);
            } catch (error) {
                console.error("Erreur taux de change:", error);
                return 0.93; 
            }
        }

        async function fetchPrice(ticker) {
            // Coupe-circuit manuel pour SpaceX
            if (ticker === 'SPCX') {
                return manualSpcxPrice !== null ? manualSpcxPrice : 166.84;
            }

            try {
                const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${API_KEY}`);
                const data = await response.json();
                
                if (data.c === 0 || !data.c) return null; 
                return data.c;
            } catch (error) {
                console.error(`Erreur pour ${ticker}:`, error);
                return null;
            }
        }

        async function updateDashboard() {
            const eurRate = await fetchExchangeRate();
            document.getElementById('exchange-rate-display').innerText = `1 USD = ${eurRate.toFixed(4)} EUR`;

            const container = document.getElementById('assets-container');
            container.innerHTML = ''; 

            let totalInvestedUsd = 0;
            let totalCurrentValueUsd = 0;

            for (const asset of portfolio) {
                const currentPriceUsd = await fetchPrice(asset.ticker);
                const priceToUseUsd = currentPriceUsd || asset.pru; 

                const investedValueUsd = asset.shares * asset.pru;
                const currentValueUsd = asset.shares * priceToUseUsd;
                const plValueUsd = currentValueUsd - investedValueUsd;
                const plPercent = (plValueUsd / investedValueUsd) * 100;

                const priceToUseEur = priceToUseUsd * eurRate;
                const plValueEur = plValueUsd * eurRate;

                totalInvestedUsd += investedValueUsd;
                totalCurrentValueUsd += currentValueUsd;

                const isUp = plValueUsd >= 0;
                const colorClass = isUp ? 'up' : 'down';
                const sign = isUp ? '+' : '';
                
                const trendClass = isUp ? 'trend-up' : 'trend-down';
                const trendIcon = isUp ? '▲' : '▼';
                const animatedBadge = `<div class="trend-badge ${trendClass}">${trendIcon} ${Math.abs(plPercent).toFixed(2)}%</div>`;

                const strat = strategies[asset.ticker];
                let progressHtml = '';

                if (strat.targetPrice) {
                    const progress = Math.min((priceToUseUsd / strat.targetPrice) * 100, 100);
                    progressHtml = `
                        <div style="font-size: 11px; margin-top: 8px; color: #8b9bb4;">Progression (Cible: ${strat.targetPrice}$) : ${progress.toFixed(1)}%</div>
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${progress}%;"></div>
                        </div>
                    `;
                }

                // Construction de la carte avec Prix d'achat et étiquette Gain/Perte explicite
                const card = document.createElement('div');
                card.className = 'asset-card';
                card.innerHTML = `
                    <div class="asset-main">
                        <div class="asset-info">
                            <span class="asset-ticker">${asset.ticker}</span>
                            <span class="asset-shares">${asset.shares.toFixed(4)} parts</span>
                            <span class="asset-pru">Acheté à : ${asset.pru.toFixed(2)} $</span>
                        </div>
                        <div class="asset-numbers">
                            <span class="asset-price">${priceToUseEur.toFixed(2)} € <span class="usd-text">(${priceToUseUsd.toFixed(2)} $)</span></span>
                            <div class="pl-label">Gain / Perte :</div>
                            <span class="asset-pl ${colorClass}">${sign}${plValueEur.toFixed(2)} € <span class="usd-text">(${sign}${plValueUsd.toFixed(2)} $)</span></span>
                        </div>
                        ${animatedBadge}
                    </div>
                    <div class="strategy-box">
                        <span class="strategy-title">${strat.title}</span>
                        ${strat.desc}
                        ${progressHtml}
                    </div>
                `;
                container.appendChild(card);
            }

            const totalCurrentValueEur = totalCurrentValueUsd * eurRate;
            const totalPlValueUsd = totalCurrentValueUsd - totalInvestedUsd;
            const totalPlValueEur = totalPlValueUsd * eurRate;
            const totalPlPercent = (totalPlValueUsd / totalInvestedUsd) * 100;
            const isTotalUp = totalPlValueUsd >= 0;

            document.getElementById('total-value-eur').innerText = `${totalCurrentValueEur.toFixed(2)} €`;
            document.getElementById('total-value-usd').innerText = `~ ${totalCurrentValueUsd.toFixed(2)} $`;
            
            const totalPlElement = document.getElementById('total-pl');
            totalPlElement.innerHTML = `
                ${isTotalUp ? '+' : ''}${totalPlValueEur.toFixed(2)} € 
                <span class="usd-text">(${isTotalUp ? '+' : ''}${totalPlValueUsd.toFixed(2)} $)</span> 
                | ${isTotalUp ? '+' : ''}${totalPlPercent.toFixed(2)} %
            `;
            totalPlElement.className = `total-pl ${isTotalUp ? 'up' : 'down'}`;

            const now = new Date();
            document.getElementById('last-update').innerText = `Dernière mise à jour : ${now.toLocaleTimeString('fr-FR')}`;
        }

        updateDashboard();
        setInterval(updateDashboard, 60000); 

    </script>
</body>
</html>
